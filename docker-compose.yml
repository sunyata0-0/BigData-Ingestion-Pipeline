services:

  mysql:
    image: mysql:8.4
    container_name: mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ingestion
      MYSQL_USER: nifi
      MYSQL_PASSWORD: nifi

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin

    restart: unless-stopped

    depends_on:
      - mysql

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    ports:
      - "8081:80"

  nifi:
    image: apache/nifi:2.10.0
    container_name: nifi

    restart: unless-stopped

    ports:
      - "8444:8443"

    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: mahdi
      SINGLE_USER_CREDENTIALS_PASSWORD: "mahdi2003,///"
      NIFI_WEB_PROXY_HOST: localhost:8444,nifi:8443
      NIFI_SENSITIVE_PROPS_KEY: Bg7mEEFaY9q8BJ8OXFfLrfmL0F+10778

    volumes:
      - ./data:/data
      - ./nifi/extensions:/opt/nifi/nifi-current/nar_extensions
      - ./nifi/jdbc:/opt/nifi/nifi-current/jdbc
      - ./hadoop/config:/opt/nifi/hadoop-conf
      - ./nifi/conf:/opt/nifi/nifi-current/conf
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode

    restart: unless-stopped

    ports:
      - "9870:9870"
      - "9000:9000"

    environment:
      - CLUSTER_NAME=bigdata

    env_file:
      - ./hadoop/hadoop.env

    volumes:
      - ./hadoop/namenode:/hadoop/dfs/name


  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode

    restart: unless-stopped

    depends_on:
      - namenode

    env_file:
      - ./hadoop/hadoop.env

    volumes:
      - ./hadoop/datanode:/hadoop/dfs/data

  airflow-db:
    image: postgres:16
    container_name: airflow-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data


  airflow-init:
    image: apache/airflow:2.10.5
    container_name: airflow-init

    depends_on:
      - airflow-db

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Mahdi
      --lastname User
      --role Admin
      --email notmahdi2@gmail.com
      "
    
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
  
  
  airflow:
    image: apache/airflow:2.10.5
    container_name: airflow

    restart: unless-stopped

    depends_on:
      - airflow-db
      - airflow-init

    ports:
      - "8082:8080"

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow

    command: standalone

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    
  hive:
    image: apache/hive:4.1.0
    container_name: hive

    restart: unless-stopped

    depends_on:
      - namenode

    ports:
      - "10000:10000"
      - "10002:10002"

    environment:
      SERVICE_NAME: hiveserver2
      HIVE_CUSTOM_CONF_DIR: /hive-conf
      DB_DRIVER: mysql
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:mysql://mysql:3306/hive?createDatabaseIfNotExist=true
        -Djavax.jdo.option.ConnectionDriverName=com.mysql.cj.jdbc.Driver
        -Djavax.jdo.option.ConnectionUserName=root
        -Djavax.jdo.option.ConnectionPassword=root

    volumes:
      - ./hadoop/config:/hive-conf
      - ./hive/jdbc/mysql-connector-j-9.6.0.jar:/opt/hive/lib/mysql-connector-j-9.6.0.jar
  

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap
    environment:
      LDAP_ORGANISATION: "Internship"
      LDAP_DOMAIN: "intern.local"
      LDAP_ADMIN_PASSWORD: admin
    ports:
      - "389:389"
    volumes:
      - ldap_database:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
    ports:
      - "8085:443"
    depends_on:
      - ldap


volumes:
  mysql_data:
  nifi_conf:
  nifi_state:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  airflow_postgres_data:
  ldap_database:
  ldap_config:
